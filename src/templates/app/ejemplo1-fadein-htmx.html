<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 1: Fade-in con HTMX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        /* Clase personalizada para la transición */
        .fade-in-content {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .fade-in-content.htmx-settling {
            opacity: 0;
        }
        .fade-in-content:not(.htmx-settling) {
            opacity: 1;
        }
        
        /* Estilos Nier: Automata */
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
        }
        .nier-border {
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .nier-accent {
            color: #00ffff;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 nier-accent">Ejemplo 1: Fade-in con HTMX y CSS</h1>
        <p class="mb-4 text-sm">Haz clic en el botón para cargar contenido con una transición suave de opacidad.</p>
        
        <button 
            hx-get="/examples/content-fragment.html" 
            hx-target="#content-area"
            hx-swap="innerHTML"
            class="px-4 py-2 bg-white/10 hover:bg-white/20 border border-white/30 text-white font-mono text-sm transition-colors duration-300">
            Cargar Contenido
        </button>

        <div id="content-area" class="mt-6 p-6 nier-border fade-in-content">
            <p class="text-xs text-gray-500">El contenido aparecerá aquí...</p>
        </div>
    </div>

</body>
</html>
